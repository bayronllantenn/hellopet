{% extends 'veterinaria/base.html' %}

{% block title %}Panel Veterinario | HelloPet{% endblock %}

{% block content %}

<div class="hp-page-header mb-4">
    <div>
        <span class="hp-section-label">Panel de control</span>
        <h2 class="hp-page-title">Veterinario</h2>
    </div>
</div>

<div class="mb-5">
    <span class="hp-section-label mb-3 d-block">
        Accesos rápidos
    </span>
    <div class="row g-3">
        <div class="col-md-4">
            <a href="{% url 'listar_citas' %}" class="text-decoration-none">
                <div class="card shadow-sm border-0 h-100 quick-card">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-calendar-check fs-1 mb-3"></i>
                        <h6 class="mb-1">
                            Mis citas
                        </h6>
                        <small>
                            Ver citas asignadas
                        </small>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="{% url 'listar_ficha' %}" class="text-decoration-none">
                <div class="card shadow-sm border-0 h-100 quick-card">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-file-medical fs-1 mb-3"></i>
                        <h6 class="mb-1">
                            Fichas médicas
                        </h6>
                        <small>
                            Revisar historial clínico
                        </small>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="#" class="text-decoration-none">
                <div class="card shadow-sm border-0 h-100 quick-card">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-person-vcard fs-1 mb-3"></i>
                        <h6 class="mb-1">
                            Pacientes
                        </h6>
                        <small>
                            Próximamente
                        </small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
